<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazel – Daily Yiddish Wisdom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF7F2;
      color: #2D3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo { font-size: 48px; font-weight: 700; color: #B7791F; letter-spacing: 4px; margin-bottom: 8px; }
    .tagline { font-size: 16px; color: #718096; letter-spacing: 1px; margin-bottom: 48px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-bottom: 32px;
    }
    .card-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .card-body { font-size: 15px; color: #718096; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #B7791F;
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .btn:hover { background: #975A16; }
    .status { font-size: 13px; color: #A0AEC0; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="logo">MAZEL</div>
  <div class="tagline">Daily Yiddish Wisdom &amp; Stories</div>

  <div class="card">
    <div class="card-title" id="content-title">Opening in Mazel…</div>
    <div class="card-body" id="content-body">
      If the app doesn't open automatically, download Mazel from the App Store.
    </div>
    <a class="btn" href="https://apps.apple.com/app/id6740949566" id="app-store-btn">
      Download on the App Store
    </a>
    <div class="status" id="status-text">Redirecting…</div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname; // e.g. /story/story_025
      // Convert universal link path to custom scheme: /story/story_025 → mazel://story/story_025
      var scheme = 'mazel:/' + path;

      // Try to open the app via custom scheme
      var appOpened = false;
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = scheme;
      document.body.appendChild(iframe);

      // Detect if app opened (page will blur if it did)
      window.addEventListener('blur', function () { appOpened = true; });

      // After 2.5s, if app didn't open, show the App Store CTA
      setTimeout(function () {
        if (!appOpened) {
          document.getElementById('content-title').textContent = 'Get Mazel';
          document.getElementById('content-body').textContent =
            'Download Mazel to read Yiddish wisdom and stories on your iPhone.';
          document.getElementById('status-text').textContent = '';
          // Try direct redirect to App Store
          window.location.href = 'https://apps.apple.com/app/id6740949566';
        }
      }, 2500);
    })();
  </script>
</body>
</html>
